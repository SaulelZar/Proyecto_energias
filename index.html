<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Simulador Fotovoltaico Industrial
    </title>


    <!-- =====================================
         FUENTES
    ====================================== -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">


    <!-- =====================================
         CHART.JS
    ====================================== -->

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


    <!-- =====================================
         CSS
    ====================================== -->

    <link rel="stylesheet"
          href="./css/styles.css">

</head>

<body>

    <!-- =====================================
         HEADER
    ====================================== -->

    <header class="header">

        <div>

            <h1>
                Simulador Fotovoltaico Industrial
            </h1>

            <p>
                Análisis energético y eficiencia solar
            </p>

        </div>

    </header>



    <!-- =====================================
         LAYOUT PRINCIPAL
    ====================================== -->

    <div class="container">




        <!-- =================================
             SIDEBAR
        ================================== -->

        <aside class="sidebar">




            <!-- =============================
                 UBICACION
            ============================== -->

            <section class="section">

                <h2>Ubicación</h2>

                <div class="input-group">

                    <label for="latitud">
                        Latitud
                    </label>

                    <input type="number"
                           step="any"
                           id="latitud"
                           value="25.6866">

                </div>

                <div class="input-group">

                    <label for="longitud">
                        Longitud
                    </label>

                    <input type="number"
                           step="any"
                           id="longitud"
                           value="-100.3161">

                </div>

                <div class="input-group">

                    <label for="altitud">
                        Altitud (m)
                    </label>

                    <input type="number"
                           step="any"
                           id="altitud"
                           value="540">

                </div>

            </section>




            <!-- =============================
                 SISTEMA FV
            ============================== -->

            <section class="section">

                <h2>
                    Sistema Fotovoltaico
                </h2>

                <div class="input-group">

                    <label for="eficiencia">
                        Eficiencia (%)
                    </label>

                    <input type="number"
                           step="0.1"
                           id="eficiencia"
                           value="22">

                </div>

                <div class="input-group">

                    <label for="area">
                        Área total (m²)
                    </label>

                    <input type="number"
                           step="0.1"
                           id="area"
                           value="4">

                </div>

                <div class="input-group">

                    <label for="potencia">
                        Potencia nominal (kW)
                    </label>

                    <input type="number"
                           step="0.1"
                           id="potencia"
                           value="1">

                </div>

            </section>




            <!-- =============================
                 INSTALACION
            ============================== -->

            <section class="section">

                <h2>Instalación</h2>

                <div class="input-group">

                    <label for="inclinacion">
                        Inclinación (°)
                    </label>

                    <input type="number"
                           step="0.1"
                           id="inclinacion"
                           value="25">

                </div>

                <div class="input-group">

                    <label for="azimut">
                        Azimut (°)
                    </label>

                    <input type="number"
                           step="0.1"
                           id="azimut"
                           value="180">

                </div>

            </section>




            <!-- =============================
                 DEMANDA
            ============================== -->

            <section class="section">

                <h2>
                    Perfil de Demanda
                </h2>

                <div class="input-group">

                    <label for="perfil">
                        Tipo de perfil
                    </label>

                    <select id="perfil">

                        <option>
                            Verano
                        </option>

                        <option>
                            No Verano
                        </option>

                        <option>
                            Fin de Semana
                        </option>

                    </select>

                </div>

                <div class="input-group">

                    <label for="csvInput">
                        Subir CSV
                    </label>

                    <input type="file"
                           id="csvInput"
                           accept=".csv">

                </div>

            </section>




            <!-- =============================
                 BOTON
            ============================== -->

            <button id="calcularBtn">

                Calcular Simulación

            </button>




            <!-- =============================
                 MENSAJES
            ============================== -->

            <div id="statusMessage">

            </div>

        </aside>




        <!-- =================================
             MAIN CONTENT
        ================================== -->

        <main class="main-content">




            <!-- =============================
                 KPI DASHBOARD
            ============================== -->

            <section class="dashboard">

                <div class="card">

                    <h3>
                        Generación Anual
                    </h3>

                    <p id="genAnual">
                        0 kWh
                    </p>

                </div>

                <div class="card">

                    <h3>
                        Eficiencia
                    </h3>

                    <p id="efSistema">
                        0%
                    </p>

                </div>

                <div class="card">

                    <h3>
                        Cobertura
                    </h3>

                    <p id="cobertura">
                        0%
                    </p>

                </div>

                <div class="card">

                    <h3>
                        Potencia Pico
                    </h3>

                    <p id="potenciaPico">
                        0 kW
                    </p>

                </div>

            </section>




            <!-- =============================
                 GRAFICAS
            ============================== -->

            <section class="chart-container">

                <h2>
                    Potencia Generada
                </h2>

                <canvas id="powerChart">

                </canvas>

            </section>




            <section class="chart-container">

                <h2>
                    Irradiancia Solar
                </h2>

                <canvas id="irradianceChart">

                </canvas>

            </section>




            <section class="chart-container">

                <h2>
                    Sistema de Baterías
                </h2>

                <canvas id="batteryChart">

                </canvas>

            </section>




            <section class="chart-container">

                <h2>
                    Temperatura del Panel
                </h2>

                <canvas id="temperatureChart">

                </canvas>

            </section>

        </main>

    </div>




    <!-- =====================================
         MAIN JS
    ====================================== -->

    <script type="module"
            src="./js/main.js">

    </script>

</body>

</html>
